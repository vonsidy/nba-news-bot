name: Publish dashboard data

# Builds the public dashboard JSON (dashboard/public/nbasignal.json) from the
# REAL numbers in the shared Upstash Redis — followers/impressions (x:*, written
# by the nba-signal X sync), the bot's own recent posts (bot:recent) and feed
# health (bot:feeds) — then commits it. The shared multi-bot dashboard fetches
# this file to render TheNBASignal natively, so it stays live without a redeploy.

on:
  schedule:
    - cron: "7 * * * *"      # hourly at :07 (off-peak minute fires more reliably)
  workflow_dispatch: {}

concurrency:
  group: nba-dashboard
  cancel-in-progress: false

permissions:
  contents: write             # lets the run commit the updated data file (no PAT needed)

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Build dashboard JSON from the shared Redis
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: python dashboard_data.py

      - name: Commit updated data
        run: |
          git config user.name "nba-signal-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dashboard/public/nbasignal.json
          if git diff --cached --quiet; then echo "no changes"; exit 0; fi
          git commit -m "Update dashboard data [skip ci]"
          for i in 1 2 3; do
            if git pull --rebase --autostash origin main && git push; then
              echo "pushed"; exit 0
            fi
            sleep $((i * 3))
          done
          echo "push failed after retries"; exit 1
