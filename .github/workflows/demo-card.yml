name: Demo card

# Manually generate a sample trade card (with the real player photo) to preview
# the design. Prints the image base64-encoded to the log. Does NOT post anything.
on:
  workflow_dispatch:
    inputs:
      player:
        description: "Player full name"
        default: "LeBron James"
      to_team:
        description: "Destination team"
        default: "Warriors"
      from_team:
        description: "Origin team"
        default: "Lakers"

jobs:
  demo:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Render demo card
        run: python tools/demo_card.py "${{ github.event.inputs.player }}" "${{ github.event.inputs.to_team }}" "${{ github.event.inputs.from_team }}"
