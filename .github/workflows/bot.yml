name: NBA news bot

# Runs the bot in the cloud on a schedule — no PC needed.
# GitHub Actions is free and fires ~every 10 minutes (may be delayed a few
# minutes under load). State (dedup + daily cap) lives in Upstash Redis, so
# each run picks up where the last left off.

on:
  schedule:
    # ONE hourly trigger, not 144 ten-minute ones. GitHub's scheduler is
    # best-effort and silently drops scheduled jobs under load — asking for 144
    # runs/day delivered TWO on 2026-07-20. So the job no longer does a single
    # cycle and exit; it starts the bot's own polling loop and stays alive for
    # just under GitHub's 6h job ceiling.
    #
    # The hourly trigger is a relay, not the poller: `concurrency` below keeps
    # one run alive and one queued, so whenever the live run ends (timeout,
    # crash, or a dropped trigger) the queued one takes over within the hour.
    # Coverage no longer depends on the scheduler firing on time.
    - cron: "7 * * * *"
  workflow_dispatch: {}   # lets you trigger a run manually from the Actions tab

# Prevent overlapping runs if one takes longer than the interval
concurrency:
  group: nba-bot
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 355   # hard backstop; the `timeout` below exits first
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Fetch display font (Anton) for the cards
        run: |
          mkdir -p assets
          curl -sSL --retry 3 -o assets/font-bold.ttf \
            https://github.com/google/fonts/raw/main/ofl/anton/Anton-Regular.ttf \
            || echo "font download failed; card.py falls back to a system font"

      - name: Run the bot continuously until just before the job ceiling
        env:
          DRY_RUN: "false"
          # Reads a repo VARIABLE (Settings > Secrets and variables > Actions >
          # Variables), so the ceiling can be raised, lowered, or removed without
          # touching code. Unset/empty = uncapped, which is the intended
          # steady state: duplicate protection is the per-story dedup and the
          # per-subject daily backstop, not a blanket cap that throttles real
          # news along with the noise. This used to be hardcoded to "6" here,
          # silently overriding config.py.
          MAX_POSTS_PER_DAY: ${{ vars.MAX_POSTS_PER_DAY }}
          POLL_SECONDS: "90"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        # 5h45m, comfortably inside GitHub's 6h job ceiling. `timeout` exits 124
        # when it fires, which is the expected path — treat only a real crash as
        # a failure so the Actions tab stays honest.
        run: timeout 20700 python bot.py || [ $? -eq 124 ]
