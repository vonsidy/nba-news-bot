name: NBA news bot

# Runs the bot in the cloud on a schedule — no PC needed.
# GitHub Actions is free and fires ~every 10 minutes (may be delayed a few
# minutes under load). State (dedup + daily cap) lives in Upstash Redis, so
# each run picks up where the last left off.

on:
  schedule:
    # Offset minutes (:04, :14, ...) instead of */10: GitHub's scheduler is
    # most congested at round minutes (:00, :10) and silently drops jobs
    # queued then — off-peak minutes fire noticeably more reliably.
    - cron: "4,14,24,34,44,54 * * * *"
  workflow_dispatch: {}   # lets you trigger a run manually from the Actions tab

# Prevent overlapping runs if one takes longer than the interval
concurrency:
  group: nba-bot
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Fetch display font (Anton) for the cards
        run: |
          mkdir -p assets
          curl -sSL --retry 3 -o assets/font-bold.ttf \
            https://github.com/google/fonts/raw/main/ofl/anton/Anton-Regular.ttf \
            || echo "font download failed; card.py falls back to a system font"

      - name: Run one bot cycle
        env:
          DRY_RUN: "false"
          MAX_POSTS_PER_DAY: "15"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: python bot.py --once
